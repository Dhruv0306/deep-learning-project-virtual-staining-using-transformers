<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1800 1250" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <style>
            .box { fill: #f2f1ee; stroke: #7d1916; stroke-width: 2; }
            .subgraph { fill: none; stroke: #7d1916; stroke-width: 2; stroke-dasharray: 5,5; }
            .text { font-family: Arial; font-size: 16px; text-anchor: middle; fill: #7d1916}
            .title { font-weight: bold; font-size: 18px; }
            .arrow { stroke: #7d1916; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
            .dash-arrow { stroke: #7d1916; stroke-width: 2; fill: none; stroke-dasharray: 5,5; marker-end: url(#arrowhead); }
        </style>
        <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
            <polygon points="0 0, 10 3, 0 6" fill="#7d1916" />
        </marker>
    </defs>

    <!-- Input Layer -->
    <rect x="50" y="20" width="350" height="80" class="box" rx="5"/>
    <text x="225" y="45" class="text title">Condition Image</text>
    <text x="225" y="65" class="text">Shape: (N, 3, 256, 256)</text>

    <rect x="450" y="20" width="350" height="80" class="box" rx="5"/>
    <text x="625" y="45" class="text title">Noisy Latent (z_t)</text>
    <text x="625" y="65" class="text">Shape: (N, 4, 32, 32)</text>

    <rect x="850" y="20" width="350" height="80" class="box" rx="5"/>
    <text x="1025" y="45" class="text title">Target Domain ID</text>
    <text x="1025" y="65" class="text">Shape: (N,)</text>

    <rect x="1250" y="20" width="350" height="80" class="box" rx="5"/>
    <text x="1425" y="45" class="text title">Timestep (t)</text>
    <text x="1425" y="65" class="text">Shape: (N,)</text>

    <!-- Condition Tokenizer Subgraph -->
    <rect x="50" y="140" width="400" height="200" class="subgraph" rx="10"/>
    <text x="80" y="165" class="title">Condition Tokenizer</text>

    <rect x="80" y="190" width="340" height="60" class="box" rx="5"/>
    <text x="250" y="215" class="text title">Multi-scale Proj (Full + 2x Pool)</text>
    <text x="250" y="230" class="text">Sum + Pos Embed</text>

    <rect x="80" y="270" width="340" height="80" class="box" rx="5"/>
    <text x="250" y="295" class="text title">Condition Tokens</text>
    <text x="250" y="315" class="text">Shape: (N, 256, 512)</text>

    <!-- Connection 1: Condition Image to CondT (Multi-scale Proj) -->
    <polyline points="225,100 225,130 250,130 250,190" class="arrow"/>
    <polyline points="80,220 40,220 40,290 80,290" class="arrow"/>

    <!-- Domain Embedding -->
    <rect x="500" y="190" width="300" height="60" class="box" rx="5"/>
    <text x="650" y="215" class="text title">Domain Embedding Layer</text>

    <rect x="500" y="280" width="300" height="80" class="box" rx="5"/>
    <text x="650" y="305" class="text title">Domain Token</text>
    <text x="650" y="325" class="text">Shape: (N, 512)</text>

    <!-- Connection 5: Domain ID to D_EMB -->
    <polyline points="1025,100 1025,150 650,150 650,190" class="arrow"/>
    <polyline points="500,220 470,220 470,300 500,300" class="arrow"/>

    <!-- Connection 7: Domain Token broadcast to Condition Tokens (dotted) -->
    <polyline points="500,320 420,310" class="dash-arrow"/>

    <!-- PatchEmbed Stem -->
    <rect x="870" y="190" width="350" height="80" class="box" rx="5"/>
    <text x="1045" y="210" class="text title">PatchEmbed Stem</text>
    <text x="1045" y="230" class="text">(Overlapping Convs) +</text>
    <text x="1045" y="250" class="text">Pos Embed</text>

    <rect x="870" y="290" width="350" height="80" class="box" rx="5"/>
    <text x="1045" y="315" class="text title">Latent Tokens</text>
    <text x="1045" y="335" class="text">Shape: (N, 256, 512)</text>

    <!-- Connection 3: Noisy Latent (z_t) to PE (PatchEmbed Stem) -->
    <polyline points="625,100 625,120 1000,120 1000,190" class="arrow"/>
    <!-- Connection 4: PE to Tokens (Latent Tokens) -->
    <polyline points="870,240 840,240 840,330 870,330" class="arrow"/>

    <!-- Timestep Embedding -->
    <rect x="1280" y="190" width="300" height="80" class="box" rx="5"/>
    <text x="1430" y="210" class="text title">MLP(Sincos(t))</text>
    <text x="1430" y="230" class="text">Timestep Token</text>
    <text x="1430" y="250" class="text">Shape: (N, 512)</text>

    <!-- Connection 8: Timestep (t) to T_EMB (MLP) -->
    <polyline points="1425,100 1425,190" class="arrow"/>

    <!-- Mean Pool of Condition Tokens -->
    <rect x="250" y="380" width="280" height="80" class="box" rx="5"/>
    <text x="390" y="405" class="text title">Mean Pool of</text>
    <text x="390" y="425" class="text">CondTokens (N, 512)</text>

    <!-- Connection 10: CondTokens to CondGlobal -->
    <polyline points="250,350 250,360 280,360 280,380" class="arrow"/>

    <!-- Global Modulator -->
    <rect x="600" y="380" width="300" height="100" class="box" rx="5"/>
    <text x="750" y="400" class="text title">Global Modulator</text>
    <text x="750" y="420" class="text">(cond) Summation</text>
    <text x="750" y="440" class="text">Shape: (N, 512)</text>

    <!-- Connection 12: CondGlobal to SUMCond -->
    <polyline points="530,420 600,420" class="arrow"/>
    <!-- Connection 11: T_D to SUMCond -->
    <polyline points="1430,270 1430,430 900,430" class="arrow"/>

    <!-- DiT Blocks Subgraph -->
    <rect x="50" y="520" width="1500" height="400" class="subgraph" rx="10"/>
    <text x="80" y="545" class="title">DiT Blocks (depth=8)</text>

    <rect x="100" y="580" width="200" height="60" class="box" rx="5"/>
    <text x="200" y="605" class="text title">DiT Block 1</text>

    <rect x="350" y="580" width="280" height="60" class="box" rx="5"/>
    <text x="490" y="605" class="text title">... DiT Blocks ...</text>

    <rect x="700" y="580" width="320" height="80" class="box" rx="5"/>
    <text x="860" y="600" class="text title">Alternating Full /</text>
    <text x="860" y="620" class="text">Mean-Pooled</text>

    <!-- Connection 13: Latent Tokens to Block1 -->
    <polyline points="1045,370 1000,500 200,500 200,580" class="arrow"/>
    <!-- Connection 14: CondTokens to Block1 -->
    <polyline points="250,350 250,500 150,500 150,580" class="arrow"/>
    <!-- Connection 15: SUMCond to Block1 -->
    <polyline points="750,480 750,500 250,500 250,580" class="arrow"/>

    <!-- Connection 16: Block1 to BlockN -->
    <polyline points="300,610 350,610" class="arrow"/>
    <!-- Flow through blocks -->
    <polyline points="630,610 700,610" class="arrow"/>

    <rect x="100" y="680" width="900" height="60" class="box" rx="5"/>
    <text x="550" y="705" class="text title">Tokens Output (N, 256, 512)</text>

    <!-- Connection 17: BlockN to TokensOutput -->
    <polyline points="860,660 550,660 550,680" class="arrow"/>

    <!-- Linear Head & Unpatchify Subgraph -->
    <rect x="50" y="780" width="1500" height="280" class="subgraph" rx="10"/>
    <text x="80" y="805" class="title">Linear Head &amp; Unpatchify</text>

    <rect x="100" y="840" width="280" height="80" class="box" rx="5"/>
    <text x="240" y="865" class="text title">Linear Projection</text>
    <text x="240" y="885" class="text">(N, 256, 512)</text>

    <rect x="450" y="840" width="380" height="100" class="box" rx="5"/>
    <text x="640" y="860" class="text title">Unpatchify &amp; Reshape</text>
    <text x="640" y="880" class="text">(N, 256, 16) -&gt;</text>
    <text x="640" y="900" class="text">(N, 4, 32, 32)</text>

    <!-- Connection 18: TokensOutput to Linear Projection -->
    <polyline points="550,740 300,740 300,840" class="arrow"/>
    <!-- Connection 19: Lin to Unflat -->
    <polyline points="380,880 450,880" class="arrow"/>

    <!-- Output -->
    <rect x="250" y="1100" width="500" height="100" class="box" rx="5"/>
    <text x="500" y="1125" class="text title">Velocity/Noise Prediction</text>
    <text x="500" y="1145" class="text">(v_pred)</text>
    <text x="500" y="1165" class="text">Shape: (N, 4, 32, 32)</text>

    <polyline points="640,940 610,1000 500,1100" class="arrow"/>

</svg>
