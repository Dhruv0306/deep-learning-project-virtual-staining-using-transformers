<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1900 1100" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <style>
            .box { fill: #f2f1ee; stroke: #7d1916; stroke-width: 2; }
            .subgraph { fill: none; stroke: #7d1916; stroke-width: 2; stroke-dasharray: 5,5; }
            .text { font-family: Arial; font-size: 16px; text-anchor: middle; fill: #7d1916}
            .title { font-weight: bold; font-size: 18px; }
            .arrow { stroke: #7d1916; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
            .dash-arrow { stroke: #7d1916; stroke-width: 2; fill: none; stroke-dasharray: 5,5; marker-end: url(#arrowhead); }
        </style>
        <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
            <polygon points="0 0, 10 3, 0 6" fill="#7d1916" />
        </marker>
    </defs>

    <!-- Input -->
    <rect x="700" y="20" width="400" height="80" class="box" rx="5"/>
    <text x="900" y="45" class="text title">Fake / Real Image</text>
    <text x="900" y="65" class="text">Shape: (N, 3, 256, 256)</text>

    <!-- Branch 1: PatchGAN + MBStd -->
    <rect x="50" y="140" width="550" height="320" class="subgraph" rx="10"/>
    <text x="80" y="165" class="title">Branch 1: PatchGAN + MBStd</text>

    <!-- Branch 1 input -->
    <polyline points="700,100 400,100 400,220 350,220 320,220" class="arrow"/>

    <rect x="80" y="190" width="240" height="60" class="box" rx="5"/>
    <text x="200" y="215" class="text title">SpectralNormDiscriminator</text>

    <rect x="80" y="270" width="240" height="70" class="box" rx="5"/>
    <text x="200" y="290" class="text title">Features</text>
    <text x="200" y="310" class="text">Shape: (N, c, 16, 16)</text>

    <polyline points="200,250 200,270" class="arrow"/>

    <rect x="80" y="360" width="240" height="80" class="box" rx="5"/>
    <text x="200" y="375" class="text title">MinibatchStdDev</text>
    <text x="200" y="393" class="text">(Appends 1 std channel)</text>
    <text x="200" y="410" class="text">Shape: (N, c+1, 16, 16)</text>

    <polyline points="200,340 200,360" class="arrow"/>

    <rect x="80" y="460" width="240" height="70" class="box" rx="5"/>
    <text x="200" y="485" class="text title">Patch Logits</text>
    <text x="200" y="505" class="text">Shape: (N, 1, ~16, ~16)</text>

    <polyline points="200,440 200,460" class="arrow"/>

    <!-- Branch 2: Global Auto-Attention -->
    <rect x="700" y="140" width="550" height="320" class="subgraph" rx="10"/>
    <text x="730" y="165" class="title">Branch 2: Global Auto-Attention</text>

    <!-- Branch 2 input -->
    <polyline points="900,100 900,190" class="arrow"/>

    <rect x="730" y="190" width="240" height="60" class="box" rx="5"/>
    <text x="850" y="215" class="text title">CNN (Stride-4)</text>

    <rect x="730" y="270" width="240" height="70" class="box" rx="5"/>
    <text x="850" y="290" class="text title">Features</text>
    <text x="850" y="310" class="text">Shape: (N, 256, 4, 4)</text>

    <polyline points="850,250 850,270" class="arrow"/>

    <rect x="730" y="360" width="240" height="80" class="box" rx="5"/>
    <text x="850" y="375" class="text title">Flatten to (N, 16, 256)</text>
    <text x="850" y="393" class="text">Self-Attention +</text>
    <text x="850" y="410" class="text">LayerNorm</text>

    <polyline points="850,340 850,360" class="arrow"/>

    <rect x="730" y="460" width="240" height="70" class="box" rx="5"/>
    <text x="850" y="485" class="text title">Reshape &amp; Head</text>
    <text x="850" y="505" class="text">Shape: (N, 1, 1, 1)</text>

    <polyline points="850,440 850,460" class="arrow"/>

    <rect x="730" y="550" width="240" height="70" class="box" rx="5"/>
    <text x="850" y="575" class="text title">Scalar Logit</text>
    <text x="850" y="595" class="text">Shape: (N, 1)</text>

    <polyline points="850,530 850,550" class="arrow"/>

    <!-- Branch 3: Multi-channel FFT -->
    <rect x="1350" y="140" width="500" height="440" class="subgraph" rx="10"/>
    <text x="1380" y="165" class="title">Branch 3: Multi-channel FFT</text>

    <!-- Branch 3 input -->
    <polyline points="1100,100 1400,100 1500,100 1500,190" class="arrow"/>

    <rect x="1385" y="190" width="260" height="60" class="box" rx="5"/>
    <text x="1515" y="215" class="text title">Grayscale + R + G + B</text>
    <text x="1515" y="230" class="text">Extraction</text>

    <rect x="1385" y="270" width="260" height="80" class="box" rx="5"/>
    <text x="1515" y="290" class="text title">Log1p(Magnitude(RFFT2))</text>
    <text x="1515" y="310" class="text">Shape: (N, 4, H,</text>
    <text x="1515" y="325" class="text">W//2+1)</text>

    <polyline points="1515,250 1515,270" class="arrow"/>

    <rect x="1385" y="360" width="260" height="60" class="box" rx="5"/>
    <text x="1515" y="385" class="text title">Sample Normalization</text>

    <polyline points="1515,350 1515,360" class="arrow"/>

    <rect x="1385" y="440" width="260" height="60" class="box" rx="5"/>
    <text x="1515" y="465" class="text title">CNN</text>

    <polyline points="1515,420 1515,440" class="arrow"/>

    <rect x="1385" y="520" width="260" height="80" class="box" rx="5"/>
    <text x="1515" y="540" class="text title">Global Mean Pool</text>
    <text x="1515" y="560" class="text">Shape: (N, ~128)</text>

    <polyline points="1515,500 1515,520" class="arrow"/>

    <rect x="1385" y="620" width="260" height="70" class="box" rx="5"/>
    <text x="1515" y="645" class="text title">Scalar Logit</text>
    <text x="1515" y="665" class="text">Shape: (N, 1)</text>

    <polyline points="1515,600 1515,620" class="arrow"/>

    <!-- Convergence to Loss Weights -->
    <rect x="600" y="780" width="400" height="100" class="box" rx="5"/>
    <text x="800" y="810" class="text title">Softmax Learned</text>
    <text x="800" y="830" class="text">Component Weights</text>

    <!-- Dashed connections to Softmax -->
    <polyline points="200,530 200,700 600,830" class="dash-arrow"/>
    <polyline points="850,620 850,700 800,780" class="dash-arrow"/>
    <polyline points="1515,690 1515,700 800,700 800,780" class="dash-arrow"/>

    <!-- Final Output -->
    <rect x="600" y="950" width="400" height="100" class="box" rx="5"/>
    <text x="800" y="980" class="text title">Output Weighted</text>
    <text x="800" y="1000" class="text">Tensors</text>

    <!-- Connection to final -->
    <polyline points="800,880 800,950" class="arrow"/>

</svg>
