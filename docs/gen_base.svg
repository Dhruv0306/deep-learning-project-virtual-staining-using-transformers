<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1200 1600" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <style>
            .box { fill: #f2f1ee; stroke: #7d1916; stroke-width: 2; }
            .subgraph { fill: none; stroke: #7d1916; stroke-width: 2; stroke-dasharray: 5,5; }
            .text { font-family: Arial; font-size: 16px; text-anchor: middle; fill: #7d1916}
            .title { font-weight: bold; font-size: 18px; }
            .arrow { stroke: #7d1916; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
        </style>
        <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="10" refY="5" orient="auto">
            <polygon points="0 0, 10 5, 0 10" fill="#7d1916" />
        </marker>
    </defs>

    <!-- Input Tensor -->
    <rect x="300" y="20" width="600" height="80" class="box" rx="5"/>
    <text x="600" y="50" class="text title">Input Tensor</text>
    <text x="600" y="70" class="text">Shape: (B, 3, 256, 256)</text>

    <!-- Encoder Subgraph -->
    <rect x="80" y="140" width="1040" height="340" class="subgraph" rx="10"/>
    <text x="110" y="165" class="title">Encoder</text>

    <!-- C1: Initial Convolution -->
    <rect x="300" y="200" width="600" height="90" class="box" rx="5"/>
    <text x="600" y="225" class="text title">Reflection Pad + 7x7 Conv + IN + ReLU</text>
    <text x="600" y="245" class="text">Shape: (B, 64, 256, 256)</text>

    <!-- D1: Downsample 1 -->
    <rect x="300" y="330" width="600" height="90" class="box" rx="5"/>
    <text x="600" y="355" class="text title">3x3 Conv (stride 2) + IN + ReLU</text>
    <text x="600" y="375" class="text">Shape: (B, 128, 128, 128)</text>

    <!-- D2: Downsample 2 -->
    <rect x="300" y="460" width="600" height="90" class="box" rx="5"/>
    <text x="600" y="485" class="text title">3x3 Conv (stride 2) + IN + ReLU</text>
    <text x="600" y="505" class="text">Shape: (B, 256, 64, 64)</text>

    <!-- Input to C1 -->
    <polyline points="600,100 600,200" class="arrow"/>

    <!-- C1 to D1 -->
    <polyline points="600,290 600,330" class="arrow"/>

    <!-- D1 to D2 -->
    <polyline points="600,420 600,460" class="arrow"/>

    <!-- Transformer Components Subgraph -->
    <rect x="80" y="570" width="1040" height="160" class="subgraph" rx="10"/>
    <text x="110" y="595" class="title">Transformer Components</text>

    <!-- R1: ResNet Blocks -->
    <rect x="250" y="630" width="700" height="90" class="box" rx="5"/>
    <text x="600" y="655" class="text title">9x ResNet Blocks (Skip connections preserve structure)</text>
    <text x="600" y="675" class="text">Shape: (B, 256, 64, 64)</text>

    <!-- D2 to R1 -->
    <polyline points="600,550 600,630" class="arrow"/>

    <!-- Decoder Subgraph -->
    <rect x="80" y="780" width="1040" height="340" class="subgraph" rx="10"/>
    <text x="110" y="805" class="title">Decoder</text>

    <!-- U1: Upsample 1 -->
    <rect x="300" y="840" width="600" height="90" class="box" rx="5"/>
    <text x="600" y="865" class="text title">3x3 ConvTranspose (stride 2) + IN + ReLU</text>
    <text x="600" y="885" class="text">Shape: (B, 128, 128, 128)</text>

    <!-- U2: Upsample 2 -->
    <rect x="300" y="970" width="600" height="90" class="box" rx="5"/>
    <text x="600" y="995" class="text title">3x3 ConvTranspose (stride 2) + IN + ReLU</text>
    <text x="600" y="1015" class="text">Shape: (B, 64, 256, 256)</text>

    <!-- OutLayer: Final Convolution -->
    <rect x="300" y="1100" width="600" height="90" class="box" rx="5"/>
    <text x="600" y="1125" class="text title">Reflection Pad + 7x7 Conv + Tanh</text>
    <text x="600" y="1145" class="text">Shape: (B, 3, 256, 256)</text>

    <!-- R1 to U1 -->
    <polyline points="600,720 600,840" class="arrow"/>

    <!-- U1 to U2 -->
    <polyline points="600,930 600,970" class="arrow"/>

    <!-- U2 to OutLayer -->
    <polyline points="600,1060 600,1100" class="arrow"/>

    <!-- Output Tensor -->
    <rect x="300" y="1240" width="600" height="80" class="box" rx="5"/>
    <text x="600" y="1270" class="text title">Output Tensor</text>
    <text x="600" y="1290" class="text">Shape: (B, 3, 256, 256)</text>

    <!-- OutLayer to Output -->
    <polyline points="600,1190 600,1240" class="arrow"/>

</svg>
