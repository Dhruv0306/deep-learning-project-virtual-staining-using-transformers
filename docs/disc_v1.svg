<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <style>
            .box { fill: #f2f1ee; stroke: #7d1916; stroke-width: 2; }
            .text { font-family: Arial; font-size: 16px; text-anchor: middle; fill: #7d1916}
            .title { font-weight: bold; font-size: 18px; }
            .arrow { stroke: #7d1916; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
        </style>
        <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
            <polygon points="0 0, 10 3, 0 6" fill="#7d1916" />
        </marker>
    </defs>

    <!-- Input -->
    <rect x="200" y="20" width="400" height="80" class="box" rx="5"/>
    <text x="400" y="50" class="text title">Input Image (x)</text>
    <text x="400" y="70" class="text">Shape: (N, 3, 256, 256)</text>

    <!-- Arrow from Input to L1 -->
    <polyline points="400,100 400,140" class="arrow"/>

    <!-- L1 -->
    <rect x="175" y="140" width="450" height="80" class="box" rx="5"/>
    <text x="400" y="160" class="text title">Conv2d (stride=2) + LReLU</text>
    <text x="400" y="180" class="text">Shape: (N, 64, 128, 128)</text>

    <!-- Arrow from L1 to L2 -->
    <polyline points="400,220 400,260" class="arrow"/>

    <!-- L2 -->
    <rect x="175" y="260" width="450" height="80" class="box" rx="5"/>
    <text x="400" y="280" class="text title">Conv2d (stride=2) + IN + LReLU</text>
    <text x="400" y="300" class="text">Shape: (N, 128, 64, 64)</text>

    <!-- Arrow from L2 to L3 -->
    <polyline points="400,340 400,380" class="arrow"/>

    <!-- L3 -->
    <rect x="175" y="380" width="450" height="80" class="box" rx="5"/>
    <text x="400" y="400" class="text title">Conv2d (stride=2) + IN + LReLU</text>
    <text x="400" y="420" class="text">Shape: (N, 256, 32, 32)</text>

    <!-- Arrow from L3 to L4 -->
    <polyline points="400,460 400,500" class="arrow"/>

    <!-- L4 -->
    <rect x="175" y="500" width="450" height="80" class="box" rx="5"/>
    <text x="400" y="520" class="text title">Conv2d (stride=1) + IN + LReLU</text>
    <text x="400" y="540" class="text">Shape: (N, 512, 31, 31)</text>

    <!-- Arrow from L4 to L5 -->
    <polyline points="400,580 400,620" class="arrow"/>

    <!-- L5 Output -->
    <rect x="200" y="620" width="400" height="80" class="box" rx="5"/>
    <text x="400" y="645" class="text title">Conv2d (Final Output)</text>
    <text x="400" y="665" class="text">Shape: (N, 1, 30, 30)</text>

</svg>
