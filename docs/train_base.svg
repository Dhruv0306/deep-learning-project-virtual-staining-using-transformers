<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1600 1300" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <style>
            .box { fill: #f2f1ee; stroke: #7d1916; stroke-width: 2; }
            .subgraph { fill: none; stroke: #7d1916; stroke-width: 2; stroke-dasharray: 5,5; }
            .text { font-family: Arial; font-size: 16px; text-anchor: middle; fill: #7d1916}
            .title { font-weight: bold; font-size: 18px; }
            .arrow { stroke: #7d1916; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
            .dash-arrow { stroke: #7d1916; stroke-width: 2; fill: none; stroke-dasharray: 5,5; marker-end: url(#arrowhead); }
            .loss-box { fill: #f2f1ee; stroke: #7d1916; stroke-width: 2; }
        </style>
        <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="10" refY="5" orient="auto">
            <polygon points="0 0, 10 5, 0 10" fill="#7d1916" />
        </marker>
    </defs>

    <!-- Input Data -->
    <rect x="50" y="20" width="1500" height="120" class="subgraph" rx="10"/>
    <text x="80" y="45" class="title">Input Data</text>

    <rect x="150" y="65" width="320" height="60" class="box" rx="5"/>
    <text x="310" y="90" class="text">Real Image Domain A</text>
    <text x="310" y="105" class="text">(B, 3, 256, 256)</text>

    <rect x="1130" y="65" width="320" height="60" class="box" rx="5"/>
    <text x="1290" y="90" class="text">Real Image Domain B</text>
    <text x="1290" y="105" class="text">(B, 3, 256, 256)</text>

    <!-- Stage 1: Generator Forward Pass -->
    <rect x="50" y="170" width="1500" height="520" class="subgraph" rx="10"/>
    <text x="80" y="195" class="title">Stage 1: Generator Forward Pass</text>

    <!-- Left branch: A to B -->
    <rect x="120" y="240" width="240" height="60" class="box" rx="5"/>
    <text x="240" y="265" class="text">Generator A→B</text>

    <rect x="120" y="340" width="240" height="80" class="box" rx="5"/>
    <text x="240" y="365" class="text">Fake Image B</text>
    <text x="240" y="385" class="text">(B, 3, 256, 256)</text>

    <rect x="120" y="460" width="240" height="60" class="box" rx="5"/>
    <text x="240" y="485" class="text">Generator A→B (Cycle)</text>

    <rect x="120" y="570" width="240" height="80" class="box" rx="5"/>
    <text x="240" y="595" class="text">Reconstructed B</text>
    <text x="240" y="615" class="text">(B, 3, 256, 256)</text>

    <!-- Right branch: B to A -->
    <rect x="1240" y="240" width="240" height="60" class="box" rx="5"/>
    <text x="1360" y="265" class="text">Generator B→A</text>

    <rect x="1240" y="340" width="240" height="80" class="box" rx="5"/>
    <text x="1360" y="365" class="text">Fake Image A</text>
    <text x="1360" y="385" class="text">(B, 3, 256, 256)</text>

    <rect x="1240" y="460" width="240" height="60" class="box" rx="5"/>
    <text x="1360" y="485" class="text">Generator B→A (Cycle)</text>

    <rect x="1240" y="570" width="240" height="80" class="box" rx="5"/>
    <text x="1360" y="595" class="text">Reconstructed A</text>
    <text x="1360" y="615" class="text">(B, 3, 256, 256)</text>

    <!-- Left branch arrows -->
    <!-- Real A to Generator A→B -->
    <polyline points="310,125 310,215 240,215 240,240" class="arrow"/>
    <!-- Generator A→B to Fake Image B -->
    <polyline points="240,300 240,320 240,340" class="arrow"/>
    <!-- Fake Image B to Generator A→B Cycle -->
    <polyline points="240,420 240,440 240,460" class="arrow"/>
    <!-- Generator A→B Cycle to Reconstructed B -->
    <polyline points="240,520 240,540 240,570" class="arrow"/>

    <!-- Right branch arrows -->
    <!-- Real B to Generator B→A -->
    <polyline points="1290,125 1290,215 1360,215 1360,240" class="arrow"/>
    <!-- Generator B→A to Fake Image A -->
    <polyline points="1360,300 1360,320 1360,340" class="arrow"/>
    <!-- Fake Image A to Generator B→A Cycle -->
    <polyline points="1360,420 1360,440 1360,460" class="arrow"/>
    <!-- Generator B→A Cycle to Reconstructed A -->
    <polyline points="1360,520 1360,540 1360,570" class="arrow"/>

    <!-- Stage 2: Generator Updates -->
    <rect x="50" y="730" width="700" height="520" class="subgraph" rx="10"/>
    <text x="80" y="755" class="title">Stage 2: Generator Updates</text>

    <!-- Discriminator B Evaluation -->
    <rect x="120" y="800" width="200" height="60" class="box" rx="5"/>
    <text x="220" y="825" class="text">Discriminator B</text>

    <!-- Discriminator A Evaluation -->
    <rect x="480" y="800" width="200" height="60" class="box" rx="5"/>
    <text x="580" y="825" class="text">Discriminator A</text>

    <!-- Generator Composite Loss -->
    <rect x="150" y="930" width="500" height="120" class="loss-box" rx="5"/>
    <text x="400" y="955" class="text title">Generator Composite Loss</text>
    <text x="400" y="975" class="text">1. Adversarial Loss</text>
    <text x="400" y="995" class="text">2. Cycle Loss (Real vs Rec)</text>
    <text x="400" y="1015" class="text">3. Identity &amp; Perceptual Losses</text>

    <!-- Update Optimizers -->
    <rect x="200" y="1100" width="400" height="80" class="box" rx="5"/>
    <text x="400" y="1125" class="text title">Update G_AB &amp; G_BA</text>
    <text x="400" y="1145" class="text">via GradScaler</text>

    <!-- Fake B to Discriminator B (route via left channel at y=740) -->
    <polyline points="240,420 80,420 80,740 120,740 120,800" class="dash-arrow"/>
    <!-- Fake A to Discriminator A (route via right channel at y=760) -->
    <polyline points="1360,420 1480,420 1480,760 680,760 680,800" class="dash-arrow"/>

    <!-- Discriminator B to Loss (approach at y=900) -->
    <polyline points="220,860 220,880 220,900 320,900 320,930" class="arrow"/>
    <!-- Discriminator A to Loss (approach at y=910) -->
    <polyline points="580,860 580,885 580,910 480,910 480,930" class="arrow"/>

    <!-- Reconstructed B to Loss (approach at y=920) -->
    <polyline points="240,650 240,920 500,920 500,930" class="dash-arrow"/>
    <!-- Reconstructed A to Loss (approach at y=925) -->
    <polyline points="1360,650 1360,925 300,925 300,930" class="dash-arrow"/>

    <!-- Real A to Loss (identity, approach at y=928 from left) -->
    <polyline points="310,135 10,135 10,928 200,928 200,930" class="dash-arrow"/>
    <!-- Real B to Loss (identity, approach at y=932 from right) -->
    <polyline points="1290,135 1590,135 1590,932 600,932 600,930" class="dash-arrow"/>

    <!-- Loss to Optimizer (vertical with clearance) -->
    <polyline points="400,1050 400,1070 400,1100" class="arrow"/>

    <!-- Stage 3: Discriminator Updates -->
    <rect x="820" y="730" width="730" height="520" class="subgraph" rx="10"/>
    <text x="850" y="755" class="title">Stage 3: Discriminator Updates</text>

    <!-- Buffer A -->
    <rect x="900" y="800" width="200" height="60" class="box" rx="5"/>
    <text x="1000" y="825" class="text">Buffer/Pool Fake A</text>

    <!-- Buffer B -->
    <rect x="1250" y="800" width="200" height="60" class="box" rx="5"/>
    <text x="1350" y="825" class="text">Buffer/Pool Fake B</text>

    <!-- Discriminator A Training -->
    <rect x="900" y="920" width="200" height="60" class="box" rx="5"/>
    <text x="1000" y="945" class="text">Discriminator A</text>

    <!-- Discriminator B Training -->
    <rect x="1250" y="920" width="200" height="60" class="box" rx="5"/>
    <text x="1350" y="945" class="text">Discriminator B</text>

    <!-- Loss D_A -->
    <rect x="900" y="1040" width="200" height="90" class="loss-box" rx="5"/>
    <text x="1000" y="1065" class="text title">Loss_D_A</text>
    <text x="1000" y="1085" class="text">(Real vs Fake)</text>

    <!-- Loss D_B -->
    <rect x="1250" y="1040" width="200" height="90" class="loss-box" rx="5"/>
    <text x="1350" y="1065" class="text title">Loss_D_B</text>
    <text x="1350" y="1085" class="text">(Real vs Fake)</text>

    <!-- Update D_A -->
    <rect x="900" y="1180" width="200" height="80" class="box" rx="5"/>
    <text x="1000" y="1205" class="text title">Update D_A</text>
    <text x="1000" y="1225" class="text">via GradScaler</text>

    <!-- Update D_B -->
    <rect x="1250" y="1180" width="200" height="80" class="box" rx="5"/>
    <text x="1350" y="1205" class="text title">Update D_B</text>
    <text x="1350" y="1225" class="text">via GradScaler</text>

    <!-- Fake A to Buffer (route via right side at y=790) -->
    <polyline points="1360,420 1360,790 1000,790 1000,800" class="dash-arrow"/>

    <!-- Fake B to Buffer (route via left side at y=810) -->
    <polyline points="240,420 240,810 1350,810 1350,800" class="dash-arrow"/>

    <!-- Real A to D_A (route around left edge, arrive at y=900 from left) -->
    <polyline points="310,135 10,135 10,900 900,900" class="arrow"/>

    <!-- Buffer A to D_A (vertical from y=860 to y=920) -->
    <polyline points="1000,860 1000,910 1000,920" class="arrow"/>

    <!-- D_A output to Loss (vertical approach from above) -->
    <polyline points="1000,980 1000,1000 1000,1040" class="arrow"/>

    <!-- Real B to D_B (route around right edge, arrive at y=950 from right) -->
    <polyline points="1290,135 1590,135 1590,950 1350,950" class="arrow"/>

    <!-- Buffer B to D_B (vertical from y=860 to y=920) -->
    <polyline points="1350,860 1350,910 1350,920" class="arrow"/>

    <!-- D_B output to Loss (vertical approach from above) -->
    <polyline points="1350,980 1350,1000 1350,1040" class="arrow"/>

    <!-- Loss D_A to Update (vertical with clearance) -->
    <polyline points="1000,1130 1000,1150 1000,1180" class="arrow"/>

    <!-- Loss D_B to Update (vertical with clearance) -->
    <polyline points="1350,1130 1350,1150 1350,1180" class="arrow"/>

</svg>
